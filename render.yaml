services:
  - type: web
    name: project-service
    runtime: docker
    plan: free
    region: oregon
    envVars:
      - key: ASPNETCORE_HTTP_PORTS
        value: "10000"
      - key: DB_CONNECTION_STRING
        fromDatabase:
          name: project-db
          property: connectionString
    databases:
      - name: project-db
        plan: free
        databaseName: project_service
        user: render_user
