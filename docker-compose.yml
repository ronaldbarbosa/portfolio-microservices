services:
  postgres:
    image: postgres:16-alpine
    container_name: project_service_db
    environment:
      POSTGRES_DB: project_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-service:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak-service
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  portfolio-project:
    build:
      context: .
      dockerfile: Portfolio.Project/Dockerfile
    container_name: portfolio-project
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_CONNECTION_STRING: Host=postgres;Database=project_service;Username=postgres;Password=postgres
    ports:
      - "5148:8080"
    depends_on:
      postgres:
        condition: service_healthy

  portfolio-gateway:
    build:
      context: .
      dockerfile: Portfolio.Gateway/Dockerfile
    container_name: portfolio-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Authentication__KeyCloak__Authority: http://keycloak-service:8080/realms/Portfolio
      yarp__Clusters__projects__Destinations__portfolio__Address: http://portfolio-project:8080
    ports:
      - "5142:8080"
    depends_on:
      keycloak-service:
        condition: service_healthy
      portfolio-project:
        condition: service_started

volumes:
  postgres_data:
