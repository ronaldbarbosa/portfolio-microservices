services:
  postgres:
    image: postgres:16-alpine
    container_name: project_service_db
    environment:
      POSTGRES_DB: project_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-service:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak-service
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9000'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  portfolio-project:
    build:
      context: .
      dockerfile: Portfolio.Project/Dockerfile
    container_name: portfolio-project
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_CONNECTION_STRING: Host=postgres;Database=project_service;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy

  portfolio-gateway:
    build:
      context: .
      dockerfile: Portfolio.Gateway/Dockerfile
    container_name: portfolio-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Authentication__KeyCloak__Authority: http://keycloak-service:8080/realms/portfolio
      yarp__Clusters__projects__Destinations__portfolio__Address: http://portfolio-project:8080
      yarp__Clusters__images__Destinations__portfolio__Address: http://portfolio-image-uploader:8080
    ports:
      - "5142:8080"
    depends_on:
      keycloak-service:
        condition: service_healthy
      portfolio-project:
        condition: service_started

  portfolio-image-uploader:
    build:
      context: .
      dockerfile: Portfolio.ImageUploader/Dockerfile
    container_name: portfolio-image-uploader
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}

volumes:
  postgres_data:
